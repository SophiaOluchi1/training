<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content: Video, Audio, Iframe</title>
  </head>
  <body>
    <video controls 
    autoplay
    muted 
    loop 
    poster="2019lexus.jpg" 
    preload="metadata"
    width="200" height="200">
      <source src="video/soso.mp4" type="video/mp4" />
      <source src="video/soso.webm" type="video/webm" />
      <source src="video/soso.ogg" type="video/ogg" />
      Your browser doesn't support video
    </video>
    <br>

    <audio controls autoplay muted preload="metadata" >
      <source src="audio/audio.mp3" type="audio/mpeg">
      <source src="audio/audio.ogg" type="audio/ogg">
      your browser doesn't support audio.
    </audio>
    <br>

    <iframe 
    width="300" 
     src="https://www.youtube.com/embed/4khQlfqWWOA?si=0nPwzNjQvHa6_goY autoplay=1&mute=1" title="YouTube video player"  frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>" frameborder="0"></iframe>

     <iframe src="https://example.com/" frameborder="0"></iframe>
<!-- Subtitles-->
    <video controls 
     muted 
    loop 
    poster="2019lexus.jpg" 
    preload="metadata"
    width="200" height="200">
      <source src="video/soso.mp4" type="video/mp4" />
      <source src="video/soso.webm" type="video/webm" />
      <source src="video/soso.ogg" type="video/ogg" />
      <track src="subtitles-en.vtt" kind="subtitles" srclang="en" label="english"/>
       <track src="subtitles-es.vtt" kind="subtitles" srclang="es" label="Spanish"/>
      Your browser doesn't support video
    </video>
  </body>
</html>
